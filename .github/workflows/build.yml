name: Build Catalyst

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v2
    
    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg integrate install
      shell: cmd
    
    - name: Install libcurl via vcpkg
      run: |
        .\vcpkg\vcpkg install curl:x64-windows-static
      shell: cmd
    
    - name: Build Release x64
      run: msbuild catalyst.slnx /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:VcpkgRoot=.\vcpkg\installed\x64-windows-static /m
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: catalyst-release
        path: bin/
        retention-days: 30
