name: Build Catalyst

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Release x64
      run: msbuild catalyst.slnx /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: catalyst-release
        path: bin/
        retention-days: 30
